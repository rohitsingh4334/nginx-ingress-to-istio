name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - run: go mod download
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
      - run: go test ./internal/... -v -race -count=1
      - run: make build-all
